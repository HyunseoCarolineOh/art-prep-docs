<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 480" font-family="'Pretendard', -apple-system, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #1a3a5c; stroke-width: 2; }
    .box-p2 { fill: #ffffff; stroke: #e85d3a; stroke-width: 2; stroke-dasharray: 6,4; }
    .hdr { fill: #1a3a5c; }
    .hdr-p2 { fill: #e85d3a; }
    .hdr-text { fill: #ffffff; font-size: 13px; font-weight: 700; font-family: 'Consolas', 'Courier New', monospace; }
    .hdr-tag { fill: rgba(255,255,255,0.7); font-size: 9px; font-weight: 600; font-family: 'Pretendard', sans-serif; letter-spacing: 1px; }
    .field { fill: #4a4a4a; font-size: 11px; font-family: 'Consolas', 'Courier New', monospace; }
    .field-muted { fill: #8a8a8a; font-size: 10px; font-style: italic; font-family: 'Consolas', 'Courier New', monospace; }
    .pk { fill: #e85d3a; font-weight: 700; }
    .fk { fill: #1a3a5c; font-weight: 700; }
    .rel { stroke: #1a3a5c; stroke-width: 2; fill: none; }
    .rel-p2 { stroke: #e85d3a; stroke-width: 2; stroke-dasharray: 6,4; fill: none; }
    .rel-text { fill: #e85d3a; font-size: 12px; font-weight: 700; font-family: 'Pretendard', sans-serif; }
    .rel-bg { fill: #faf7f2; }
  </style>

  <!-- ===== 관계선 (박스 뒤에 그림) ===== -->
  <!-- profiles → saved_items -->
  <line class="rel" x1="200" y1="125" x2="440" y2="160"/>
  <rect class="rel-bg" x="290" y="129" width="56" height="18" rx="2"/>
  <text class="rel-text" x="318" y="142" text-anchor="middle">1 : N</text>

  <!-- artworks → saved_items -->
  <line class="rel" x1="880" y1="135" x2="640" y2="160"/>
  <rect class="rel-bg" x="734" y="135" width="56" height="18" rx="2"/>
  <text class="rel-text" x="762" y="148" text-anchor="middle">1 : N</text>

  <!-- profiles → curation_sessions (Phase 2) -->
  <line class="rel-p2" x1="60" y1="195" x2="80" y2="310"/>
  <rect class="rel-bg" x="2" y="240" width="106" height="18" rx="2"/>
  <text class="rel-text" x="55" y="253" text-anchor="middle">1 : N (Phase 2)</text>

  <!-- artworks → analysis_reports (Phase 2) -->
  <line class="rel-p2" x1="940" y1="213" x2="560" y2="310"/>
  <rect class="rel-bg" x="690" y="252" width="106" height="18" rx="2"/>
  <text class="rel-text" x="743" y="265" text-anchor="middle">1 : N (Phase 2)</text>

  <!-- ============ profiles (실제) ============ -->
  <g transform="translate(0, 50)">
    <rect class="box" width="200" height="146" rx="6"/>
    <path class="hdr" d="M0,32 V6 a6,6 0 0 1 6,-6 H194 a6,6 0 0 1 6,6 V32 Z"/>
    <text class="hdr-text" x="14" y="21">profiles</text>
    <text class="hdr-tag" x="186" y="22" text-anchor="end">● LIVE</text>
    <text class="field" x="14" y="54"><tspan class="pk">PK</tspan> id : uuid <tspan class="field-muted">→ auth.users</tspan></text>
    <text class="field" x="14" y="73">user_type : text</text>
    <text class="field" x="14" y="92">target_university : text</text>
    <text class="field" x="14" y="111">target_major : text</text>
    <text class="field" x="14" y="130">exam_types : text[]</text>
    <text class="field-muted" x="14" y="142">... +11 columns</text>
  </g>

  <!-- ============ saved_items (실제) ============ -->
  <g transform="translate(440, 100)">
    <rect class="box" width="200" height="125" rx="6"/>
    <path class="hdr" d="M0,32 V6 a6,6 0 0 1 6,-6 H194 a6,6 0 0 1 6,6 V32 Z"/>
    <text class="hdr-text" x="14" y="21">saved_items</text>
    <text class="hdr-tag" x="186" y="22" text-anchor="end">● LIVE · 2 rows</text>
    <text class="field" x="14" y="54"><tspan class="pk">PK</tspan> id : bigint</text>
    <text class="field" x="14" y="73"><tspan class="fk">FK</tspan> user_id <tspan class="field-muted">→ auth.users</tspan></text>
    <text class="field" x="14" y="92"><tspan class="fk">FK</tspan> artwork_id → artworks</text>
    <text class="field" x="14" y="111">created_at : timestamptz</text>
  </g>

  <!-- ============ artworks (실제) ============ -->
  <g transform="translate(880, 50)">
    <rect class="box" width="220" height="165" rx="6"/>
    <path class="hdr" d="M0,32 V6 a6,6 0 0 1 6,-6 H214 a6,6 0 0 1 6,6 V32 Z"/>
    <text class="hdr-text" x="14" y="21">artworks</text>
    <text class="hdr-tag" x="206" y="22" text-anchor="end">● LIVE</text>
    <text class="field" x="14" y="54"><tspan class="pk">PK</tspan> id : bigint</text>
    <text class="field" x="14" y="73"><tspan class="fk">FK</tspan> user_id <tspan class="field-muted">→ auth.users</tspan></text>
    <text class="field" x="14" y="92">image_url : text</text>
    <text class="field" x="14" y="111">university : text</text>
    <text class="field" x="14" y="130">art_type : text · year : int4</text>
    <text class="field" x="14" y="149">tags : text[] · passed : bool</text>
    <text class="field-muted" x="14" y="161">... +8 columns</text>
  </g>

  <!-- ============ filter_options (실제, 독립) ============ -->
  <g transform="translate(880, 240)">
    <rect class="box" width="220" height="142" rx="6"/>
    <path class="hdr" d="M0,32 V6 a6,6 0 0 1 6,-6 H214 a6,6 0 0 1 6,6 V32 Z"/>
    <text class="hdr-text" x="14" y="21">filter_options</text>
    <text class="hdr-tag" x="206" y="22" text-anchor="end">● LIVE · 15 rows</text>
    <text class="field" x="14" y="54"><tspan class="pk">PK</tspan> id : bigint</text>
    <text class="field" x="14" y="73">category : text</text>
    <text class="field-muted" x="22" y="89">university / art_type / academy_type</text>
    <text class="field" x="14" y="108">value : text</text>
    <text class="field" x="14" y="127">display_order · is_active</text>
  </g>

  <!-- ============ curation_sessions (Phase 2 예정) ============ -->
  <g transform="translate(0, 310)">
    <rect class="box-p2" width="220" height="146" rx="6"/>
    <path class="hdr-p2" d="M0,32 V6 a6,6 0 0 1 6,-6 H214 a6,6 0 0 1 6,6 V32 Z"/>
    <text class="hdr-text" x="14" y="21">curation_sessions</text>
    <text class="hdr-tag" x="206" y="22" text-anchor="end">◌ Phase 2</text>
    <text class="field" x="14" y="54"><tspan class="pk">PK</tspan> id : uuid</text>
    <text class="field" x="14" y="73"><tspan class="fk">FK</tspan> user_id → profiles</text>
    <text class="field" x="14" y="92">filter_params : jsonb</text>
    <text class="field" x="14" y="111">result_ids : uuid[]</text>
    <text class="field" x="14" y="130">created_at : timestamptz</text>
  </g>

  <!-- ============ analysis_reports (Phase 2 예정) ============ -->
  <g transform="translate(440, 310)">
    <rect class="box-p2" width="220" height="125" rx="6"/>
    <path class="hdr-p2" d="M0,32 V6 a6,6 0 0 1 6,-6 H214 a6,6 0 0 1 6,6 V32 Z"/>
    <text class="hdr-text" x="14" y="21">analysis_reports</text>
    <text class="hdr-tag" x="206" y="22" text-anchor="end">◌ Phase 2</text>
    <text class="field" x="14" y="54"><tspan class="pk">PK</tspan> id : uuid</text>
    <text class="field" x="14" y="73"><tspan class="fk">FK</tspan> artwork_id → artworks</text>
    <text class="field" x="14" y="92">step1~5 : jsonb</text>
    <text class="field" x="14" y="111">created_at : timestamptz</text>
  </g>

  <!-- 범례 -->
  <g transform="translate(0, 466)" font-family="'Pretendard', sans-serif">
    <text x="0" y="10" font-size="10" fill="#8a8a8a">
      <tspan fill="#1a3a5c" font-weight="700">● LIVE</tspan> 현재 Supabase에 생성됨 (4개) ·
      <tspan fill="#e85d3a" font-weight="700">◌ Phase 2</tspan> 미생성 예정 (점선) ·
      <tspan fill="#e85d3a" font-weight="700">PK</tspan> 기본 키 ·
      <tspan fill="#1a3a5c" font-weight="700">FK</tspan> 외래 키 ·
      <tspan font-family="'Consolas', monospace">user_id</tspan>는 모두 <tspan font-family="'Consolas', monospace">auth.users</tspan> 참조 (5/3 기준)
    </text>
  </g>
</svg>
