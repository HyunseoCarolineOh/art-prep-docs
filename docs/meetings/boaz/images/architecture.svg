<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 65 1120 435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', Roboto, sans-serif">
  <defs>
    <marker id="arrow-navy" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1a3a5c"/>
    </marker>
    <marker id="arrow-coral" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#e85d3a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#2f8a52"/>
    </marker>
    <linearGradient id="onprem-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8f0"/>
    </linearGradient>
  </defs>

  <!-- SUPABASE 점선 박스 -->
  <rect x="600" y="80" width="430" height="220" rx="12" fill="none" stroke="#1a3a5c" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="615" y="98" font-size="11" fill="#1a3a5c" font-weight="700" letter-spacing="1">SUPABASE (RLS 적용)</text>

  <!-- 연결선 -->
  <!-- USER → FRONTEND -->
  <line x1="160" y1="120" x2="280" y2="120" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrow-navy)"/>
  <!-- FRONTEND → AUTH -->
  <line x1="500" y1="130" x2="620" y2="130" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrow-navy)"/>
  <!-- EDGE FUNCTION ↔ EXT AI (양방향) -->
  <line x1="910" y1="275" x2="910" y2="380" stroke="#e85d3a" stroke-width="2" marker-end="url(#arrow-coral)"/>
  <line x1="930" y1="380" x2="930" y2="275" stroke="#e85d3a" stroke-width="2" marker-end="url(#arrow-coral)"/>
  <!-- 학습 노드 ↔ SUPABASE (양방향, dashed) -->
  <line x1="595" y1="295" x2="180" y2="380" stroke="#2f8a52" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <line x1="180" y1="375" x2="595" y2="285" stroke="#2f8a52" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <rect x="350" y="320" width="76" height="18" rx="3" fill="#faf7f2"/>
  <text x="388" y="333" text-anchor="middle" font-size="11" fill="#2f8a52" font-weight="700">학습 / 추론</text>

  <!-- USER 박스 -->
  <g transform="translate(30, 80)">
    <rect width="130" height="80" rx="8" fill="#ffffff" stroke="#e6e0d6"/>
    <text x="65" y="24" text-anchor="middle" font-size="10" fill="#8a8a8a" letter-spacing="1">USER</text>
    <text x="65" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a5c">학생</text>
    <text x="65" y="68" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">browser / mobile</text>
  </g>

  <!-- FRONTEND 박스 -->
  <g transform="translate(280, 80)">
    <rect width="220" height="100" rx="8" fill="#ffffff" stroke="#e6e0d6"/>
    <text x="110" y="24" text-anchor="middle" font-size="10" fill="#8a8a8a" letter-spacing="1">FRONTEND</text>
    <text x="110" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a5c">웹 클라이언트</text>
    <text x="110" y="68" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">Next.js + React 19</text>
    <text x="110" y="84" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">Vercel 배포</text>
  </g>

  <!-- AUTH 박스 -->
  <g transform="translate(620, 100)">
    <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#e6e0d6"/>
    <text x="90" y="24" text-anchor="middle" font-size="10" fill="#8a8a8a" letter-spacing="1">AUTH</text>
    <text x="90" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a5c">인증</text>
    <text x="90" y="68" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">Supabase Auth + RLS</text>
  </g>

  <!-- DATABASE 박스 -->
  <g transform="translate(830, 100)">
    <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#e6e0d6"/>
    <text x="90" y="24" text-anchor="middle" font-size="10" fill="#8a8a8a" letter-spacing="1">DATABASE</text>
    <text x="90" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a5c">PostgreSQL</text>
    <text x="90" y="68" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">5 tables + RLS</text>
  </g>

  <!-- STORAGE 박스 -->
  <g transform="translate(620, 200)">
    <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#e6e0d6"/>
    <text x="90" y="24" text-anchor="middle" font-size="10" fill="#8a8a8a" letter-spacing="1">STORAGE</text>
    <text x="90" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a5c">이미지 저장소</text>
    <text x="90" y="68" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">artworks/*</text>
  </g>

  <!-- EDGE FUNCTION 박스 -->
  <g transform="translate(830, 200)">
    <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#e6e0d6"/>
    <text x="90" y="24" text-anchor="middle" font-size="10" fill="#8a8a8a" letter-spacing="1">EDGE FUNCTION</text>
    <text x="90" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a5c">서버리스 함수</text>
    <text x="90" y="68" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">AI 호출 중계</text>
  </g>

  <!-- EXTERNAL AI 박스 (좌측 코랄 보더) -->
  <g transform="translate(800, 380)">
    <rect width="240" height="100" rx="8" fill="#ffffff" stroke="#e6e0d6"/>
    <rect width="4" height="100" fill="#e85d3a"/>
    <text x="120" y="24" text-anchor="middle" font-size="10" fill="#8a8a8a" letter-spacing="1">EXTERNAL AI (BASELINE)</text>
    <text x="120" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a5c">AI 모델</text>
    <text x="120" y="68" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">멀티모달 추론</text>
  </g>

  <!-- 학습 노드 박스 (onprem, 좌측 그린 보더 + 그라디언트 배경) -->
  <g transform="translate(30, 380)">
    <rect width="280" height="110" rx="8" fill="url(#onprem-grad)" stroke="#e6e0d6"/>
    <rect width="4" height="110" fill="#2f8a52"/>
    <text x="140" y="24" text-anchor="middle" font-size="10" fill="#2f8a52" font-weight="700" letter-spacing="1">★ 보유 학습 노드 (ARTPREP)</text>
    <text x="140" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a3a5c">데스크탑 GPU</text>
    <text x="140" y="70" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">자체 AI 모델 학습</text>
    <text x="140" y="86" text-anchor="middle" font-size="11" fill="#e85d3a" font-family="Consolas, monospace">BOAZ 모델 실험·학습 자유 사용</text>
  </g>
</svg>
