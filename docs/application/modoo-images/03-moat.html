<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>ArtPrep — Moat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; background: #fff; overflow: hidden; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, 'Segoe UI', sans-serif;
    color: #0a0e1a;
    -webkit-font-smoothing: antialiased;
  }
  .slide {
    width: 1920px; height: 1080px;
    padding: 56px 100px 100px;
    display: flex; flex-direction: column;
    position: relative;
    background:
      radial-gradient(900px 600px at -10% 110%, #ede6ff 0%, transparent 60%),
      radial-gradient(700px 500px at 110% -10%, #e0f4ff 0%, transparent 60%),
      #ffffff;
  }
  .top { display: flex; justify-content: space-between; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 28px; border-radius: 999px;
    background: #863bff; color: #fff;
    font-weight: 700; font-size: 22px; letter-spacing: 0.18em;
  }
  .chip::before { content: ''; width: 10px; height: 10px; border-radius: 50%; background: #47bfff; }
  .brand { display: flex; align-items: center; gap: 14px; font-weight: 800; font-size: 28px; }
  .brand .dot { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg, #863bff, #47bfff); }

  .headline {
    font-weight: 800; font-size: 72px; line-height: 1.15;
    margin-top: 32px;
    letter-spacing: -0.02em;
  }
  .headline em { color: #863bff; font-style: normal; }

  .cards {
    margin-top: 40px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
    flex: 1;
  }
  .card {
    background: #fff;
    border-radius: 32px;
    border: 1px solid #ede6ff;
    box-shadow: 0 20px 60px rgba(126, 20, 255, 0.08);
    padding: 48px 44px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .card .num {
    position: absolute; right: 36px; top: 28px;
    font-size: 140px; font-weight: 800; line-height: 1;
    color: #ede6ff;
    letter-spacing: -0.04em;
  }
  .card .tag {
    font-size: 22px; font-weight: 800; color: #7e14ff;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
    position: relative;
  }
  .card .ttl {
    font-size: 44px; font-weight: 800; letter-spacing: -0.01em;
    line-height: 1.15;
    color: #0a0e1a;
    position: relative;
  }
  .card .desc {
    margin-top: 26px;
    font-size: 24px; font-weight: 500; color: #334155; line-height: 1.55;
    flex: 1;
  }
  .card .meta {
    margin-top: 28px;
    padding-top: 22px;
    border-top: 2px dashed #ede6ff;
    font-size: 22px; color: #863bff; font-weight: 800; line-height: 1.4;
  }

  .moat-banner {
    margin-top: 32px;
    background: linear-gradient(135deg, #7e14ff 0%, #47bfff 100%);
    color: #fff;
    border-radius: 28px;
    padding: 30px 52px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 20px 60px rgba(126, 20, 255, 0.25);
  }
  .moat-banner .left {
    font-size: 32px; font-weight: 800; line-height: 1.3; letter-spacing: -0.01em;
  }
  .moat-banner .left small {
    display: block;
    font-size: 22px; font-weight: 500; opacity: 0.92; margin-top: 8px;
  }
  .moat-banner .pills {
    display: flex; gap: 18px;
  }
  .pill {
    background: rgba(255,255,255,0.18);
    padding: 14px 24px; border-radius: 999px;
    font-size: 22px; font-weight: 700;
    backdrop-filter: blur(8px);
  }
  .bottom {
    margin-top: 32px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 22px; color: #64748b; font-weight: 500;
  }
  .pageno { font-weight: 700; color: #863bff; }
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <div class="chip">MOAT</div>
    <div class="brand"><div class="dot"></div>ArtPrep</div>
  </div>

  <div class="headline">
    <em>경쟁사가 따라잡기 어려운</em> 복리형 자산<br>
  </div>

  <div class="cards">
    <div class="card">
      <div class="num">1</div>
      <div class="tag">DOMAIN</div>
      <div class="ttl">분기형<br>프롬프트 트리</div>
      <div class="desc">2년 컨설팅 채점 기준을<br>AI 로직으로 코드화</div>
      <div class="meta">→ 강사의 '감'을 시스템으로 재현</div>
    </div>
    <div class="card">
      <div class="num">2</div>
      <div class="tag">DATA</div>
      <div class="ttl">합격작 DB<br>라벨링 체계</div>
      <div class="desc">대학·전형·평가축별로<br>태깅된 합격 사례 DB</div>
      <div class="meta">→ 신생팀이 단기간에 복제 불가</div>
    </div>
    <div class="card">
      <div class="num">3</div>
      <div class="tag">UX</div>
      <div class="ttl">행동 편차<br>메트릭</div>
      <div class="desc">학생 취향과 합격 기준<br>사이 간극을 수치화</div>
      <div class="meta">→ 사용량 증가에 따라 정확도 향상</div>
    </div>
  </div>
</div>
</body>
</html>
