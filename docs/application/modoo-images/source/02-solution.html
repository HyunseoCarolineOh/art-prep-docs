<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>ArtPrep — Solution</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; background: #fff; overflow: hidden; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, 'Segoe UI', sans-serif;
    color: #0a0e1a;
    -webkit-font-smoothing: antialiased;
  }
  .slide {
    width: 1920px; height: 1080px;
    padding: 44px 100px 140px;
    display: flex; flex-direction: column;
    position: relative;
    background:
      radial-gradient(900px 600px at -10% 110%, #ede6ff 0%, transparent 60%),
      radial-gradient(700px 500px at 110% -10%, #e0f4ff 0%, transparent 60%),
      #ffffff;
  }
  .top { display: flex; justify-content: space-between; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 28px; border-radius: 999px;
    background: #863bff; color: #fff;
    font-weight: 700; font-size: 22px; letter-spacing: 0.18em;
  }
  .chip::before { content: ''; width: 10px; height: 10px; border-radius: 50%; background: #47bfff; }
  .brand { display: flex; align-items: center; gap: 14px; font-weight: 800; font-size: 28px; }
  .brand .dot { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg, #863bff, #47bfff); }

  .headline {
    font-weight: 800; font-size: 56px; line-height: 1.15;
    margin-top: 20px;
    letter-spacing: -0.02em;
  }
  .headline em { color: #863bff; font-style: normal; }
  .sub {
    margin-top: 10px;
    font-size: 20px; font-weight: 600; color: #475569;
  }

  .mockups {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
    justify-items: center;
  }
  .mockup-wrap {
    display: flex; flex-direction: column; align-items: center;
    width: 100%;
  }
  .mockup {
    position: relative;
    background: linear-gradient(180deg, #1a1530 0%, #0a0e1a 100%);
    border-radius: 32px;
    padding: 10px;
    box-shadow:
      0 24px 60px rgba(126,20,255,0.16),
      0 6px 20px rgba(0,0,0,0.10);
    display: flex; flex-direction: column;
    width: 320px;
    height: 560px;
  }
  .mockup::before {
    content: '';
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 90px; height: 6px;
    background: #2a2540;
    border-radius: 999px;
    z-index: 2;
  }
  .mockup .screen {
    flex: 1;
    border-radius: 26px;
    overflow: hidden;
    background: #fff;
    position: relative;
  }
  .mockup .screen img {
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: top center;
    display: block;
    background: #fff;
  }
  .mockup-label {
    margin-top: 18px;
    background: #fff;
    border: 1px solid #ede6ff;
    border-radius: 999px;
    padding: 10px 22px;
    font-size: 17px; font-weight: 800; color: #7e14ff;
    box-shadow: 0 6px 20px rgba(126,20,255,0.10);
    white-space: nowrap;
    text-align: center;
  }
  .mockup-desc {
    margin-top: 10px;
    font-size: 14px; font-weight: 500; color: #64748b;
    text-align: center;
    line-height: 1.45;
  }

  .kpi-row {
    margin-top: auto;
    display: flex; justify-content: space-around; align-items: center;
    padding: 20px 40px;
    background: #fff;
    border-radius: 20px;
    border: 1px solid #ede6ff;
    box-shadow: 0 12px 36px rgba(126,20,255,0.06);
  }
  .kpi-item {
    display: flex; align-items: baseline; gap: 12px;
  }
  .kpi-item strong {
    font-size: 36px; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #7e14ff, #47bfff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .kpi-item span {
    font-size: 16px; color: #475569; font-weight: 700;
  }
  .kpi-divider {
    width: 1px; height: 32px; background: #ede6ff;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <div class="chip">SOLUTION</div>
    <div class="brand"><div class="dot"></div>ArtPrep</div>
  </div>

  <div class="headline">
    <em>합격작 큐레이션 + AI 분석</em>이 결합된 입시 코칭 플랫폼.
  </div>
  <div class="sub">2026.01 출시 후 운영 중인 MVP</div>

  <div class="mockups">
    <div class="mockup-wrap">
      <div class="mockup">
        <div class="screen"><img src="mvp-home.png" alt="합격작 갤러리"></div>
      </div>
      <div class="mockup-label">합격작 갤러리</div>
      <div class="mockup-desc">실제 합격작 1,000+건<br>대학·전형별 큐레이션</div>
    </div>
    <div class="mockup-wrap">
      <div class="mockup">
        <div class="screen"><img src="mvp-filter.png" alt="대학·전형 필터"></div>
      </div>
      <div class="mockup-label">대학 · 전형 필터</div>
      <div class="mockup-desc">대학·전형 유형·학생 구분·연도<br>4축 정밀 필터링</div>
    </div>
    <div class="mockup-wrap">
      <div class="mockup">
        <div class="screen"><img src="mvp-saved.png" alt="개인 큐레이션"></div>
      </div>
      <div class="mockup-label">개인 큐레이션</div>
      <div class="mockup-desc">저장한 작품으로<br>나만의 레퍼런스 라이브러리</div>
    </div>
  </div>
</div>
</body>
</html>
