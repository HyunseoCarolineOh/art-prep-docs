<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" width="1000" height="900" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="black"/>
    </marker>
    <marker id="rarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="black"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="998" height="898" fill="white" stroke="black" stroke-width="1.5"/>

  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="bold">[도 3] 5단계 비전 AI 분석 시퀀스 다이어그램</text>
  <line x1="40" y1="50" x2="960" y2="50" stroke="black" stroke-width="1"/>

  <!-- Lane headers -->
  <rect x="60" y="80" width="180" height="50" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="150" y="110" text-anchor="middle" font-size="14" font-weight="bold">사용자 UI (180)</text>

  <rect x="310" y="80" width="180" height="50" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="400" y="110" text-anchor="middle" font-size="14" font-weight="bold">비전 AI 분석부 (130)</text>

  <rect x="560" y="80" width="180" height="50" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="650" y="110" text-anchor="middle" font-size="14" font-weight="bold">합격작 DB (110)</text>

  <rect x="810" y="80" width="180" height="50" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="900" y="110" text-anchor="middle" font-size="14" font-weight="bold">Vision API (외부)</text>

  <!-- Lifelines (점선) -->
  <line x1="150" y1="130" x2="150" y2="860" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="400" y1="130" x2="400" y2="860" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="650" y1="130" x2="650" y2="860" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="900" y1="130" x2="900" y2="860" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Message 1: UI -> 분석부 (분석 요청) -->
  <line x1="150" y1="160" x2="397" y2="160" stroke="black" stroke-width="1.5" marker-end="url(#rarr)"/>
  <text x="275" y="153" text-anchor="middle" font-size="12">1. 분석 요청 (작품 ID, 사용자 프로필)</text>

  <!-- Message 2: 분석부 -> DB (작품·메타데이터 조회) -->
  <line x1="400" y1="195" x2="647" y2="195" stroke="black" stroke-width="1.5" marker-end="url(#rarr)"/>
  <text x="525" y="188" text-anchor="middle" font-size="12">2. 작품·메타데이터 조회</text>

  <!-- Message 3: DB -> 분석부 (반환) -->
  <line x1="650" y1="225" x2="403" y2="225" stroke="black" stroke-width="1.5" marker-end="url(#rarr)" stroke-dasharray="4 3"/>
  <text x="525" y="218" text-anchor="middle" font-size="12">3. image_url, school, exam_type, 평가축 가중치</text>

  <!-- 자기 호출: 분기형 프롬프트 생성 -->
  <rect x="400" y="245" width="160" height="50" fill="white" stroke="black" stroke-width="1"/>
  <text x="480" y="262" text-anchor="middle" font-size="11">4. 분기형 프롬프트 생성</text>
  <text x="480" y="280" text-anchor="middle" font-size="10">(target_school에 따른 분기)</text>
  <path d="M 400 270 L 400 245 L 395 245" fill="none" stroke="black" stroke-width="1"/>

  <!-- Stage 1: 출제 문제 분석 -->
  <line x1="400" y1="320" x2="897" y2="320" stroke="black" stroke-width="1.5" marker-end="url(#rarr)"/>
  <text x="650" y="313" text-anchor="middle" font-size="12">① 출제 문제 분석 호출</text>
  <line x1="900" y1="350" x2="403" y2="350" stroke="black" stroke-width="1.5" marker-end="url(#rarr)" stroke-dasharray="4 3"/>

  <!-- Stage 2: 평가 포인트 추출 -->
  <line x1="400" y1="395" x2="897" y2="395" stroke="black" stroke-width="1.5" marker-end="url(#rarr)"/>
  <text x="650" y="388" text-anchor="middle" font-size="12">② 평가 포인트 추출 호출</text>
  <line x1="900" y1="425" x2="403" y2="425" stroke="black" stroke-width="1.5" marker-end="url(#rarr)" stroke-dasharray="4 3"/>

  <!-- Stage 3: 작품 의도 분석 -->
  <line x1="400" y1="470" x2="897" y2="470" stroke="black" stroke-width="1.5" marker-end="url(#rarr)"/>
  <text x="650" y="463" text-anchor="middle" font-size="12">③ 작품 의도 분석 호출 (구도·명암·선질·완성도·표현력)</text>
  <line x1="900" y1="500" x2="403" y2="500" stroke="black" stroke-width="1.5" marker-end="url(#rarr)" stroke-dasharray="4 3"/>

  <!-- Stage 4: 평가 기준 부합도 -->
  <line x1="400" y1="545" x2="897" y2="545" stroke="black" stroke-width="1.5" marker-end="url(#rarr)"/>
  <text x="650" y="538" text-anchor="middle" font-size="12">④ 평가 기준 부합도 산출 호출</text>
  <line x1="900" y1="575" x2="403" y2="575" stroke="black" stroke-width="1.5" marker-end="url(#rarr)" stroke-dasharray="4 3"/>

  <!-- Stage 5: 유사 합격작 안내 -->
  <line x1="400" y1="620" x2="897" y2="620" stroke="black" stroke-width="1.5" marker-end="url(#rarr)"/>
  <text x="650" y="613" text-anchor="middle" font-size="12">⑤ 유사 합격작 안내 호출</text>
  <line x1="900" y1="650" x2="403" y2="650" stroke="black" stroke-width="1.5" marker-end="url(#rarr)" stroke-dasharray="4 3"/>

  <!-- ai_report 저장 -->
  <line x1="400" y1="695" x2="647" y2="695" stroke="black" stroke-width="1.5" marker-end="url(#rarr)"/>
  <text x="525" y="688" text-anchor="middle" font-size="12">5. ai_report (JSONB) 저장</text>
  <line x1="650" y1="725" x2="403" y2="725" stroke="black" stroke-width="1.5" marker-end="url(#rarr)" stroke-dasharray="4 3"/>
  <text x="525" y="718" text-anchor="middle" font-size="12">commit OK</text>

  <!-- 분석 결과 UI로 반환 -->
  <line x1="400" y1="780" x2="153" y2="780" stroke="black" stroke-width="1.5" marker-end="url(#rarr)" stroke-dasharray="4 3"/>
  <text x="275" y="773" text-anchor="middle" font-size="12">6. 분석 결과 (ai_report) 반환</text>

  <!-- 범례 -->
  <rect x="60" y="820" width="940" height="50" fill="white" stroke="black" stroke-width="0.5"/>
  <text x="80" y="838" font-size="11">범례: 실선 화살표 = 요청 / 점선 화살표 = 응답 / 박스 = 자기 호출(self-call) / 점선 수직선 = lifeline</text>
  <text x="80" y="858" font-size="11">호출 ①~⑤는 비전 AI 분석부가 동일 Vision API에 순차 호출하는 5단계 분석을 의미한다.</text>
</svg>
